<!doctype html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
  </head>

  <body>
    <style>
      body{
        background-color: rgb(25,25,25);
        color:white;
        font-family:Arial;

      }
      
    </style>
    
    <p>Rock Paper Scissor</p>
    <button
      onclick="
        pickMove();
        Results('rock');

      "
    >
      Rock
    </button>
    <button
      onclick="
        pickMove();
        Results('paper');

      "
    >
      Paper
    </button>
    <button
      onclick="
        pickMove();
        Results('scissor');

      "
    >
      Scissor
    </button>

    <p class = 'js-score'></p>
    <button onclick = "ResetScore();">
      Reset
    </button>

    <script>
        let computmove = "";
      let result = "";
    
      const score = {
        wins: 0,
        losses: 0,
        ties: 0,
      };
                      updateScoreElement();

     
    

      function pickMove() {
        const randomNum = Math.random();

        if (randomNum >= 0 && randomNum < 1 / 3) {
          computmove = "rock";
        } else if (randomNum >= 1 / 3 && randomNum < 2 / 3) {
          computmove = "paper";
        } else {
          computmove = "scissor";
        }
        console.log(computmove);
      }

      function Results(playermove) {
        if (playermove === "rock") {
          if (computmove === "rock") {
            result = "Tie";
          } else if (computmove === "paper") {
            result = "you lose";
          } else if (computmove === "scissor") {
            result = "you win";
          }
        }

        if (playermove === "paper") {
          if (computmove === "rock") {
            result = "you win";
          } else if (computmove === "paper") {
            result = "Tie";
          } else if (computmove === "scissor") {
            result = "you lose";
          }
        }

        if (playermove === "scissor") {
          if (computmove === "rock") {
            result = "you lose";
          } else if (computmove === "paper") {
            result = "you win";
          } else if (computmove === "scissor") {
            result = "Tie";
          }
        }

        if(result === 'you win'){
          score.wins += 1
        }
         if(result === 'you lose'){
          score.losses += 1
        }
         if(result === 'Tie'){
          score.ties += 1
        }
        alert(`You picked ${playermove}. Computer picked ${computmove}.`)
                updateScoreElement(playermove);
      }
      function updateScoreElement(playermove){
                
                 document.querySelector('.js-score').innerHTML = `${result} The current score is - wins: ${score.wins} losses: ${score.losses} ties: ${score.ties}`

      }

      function ResetScore(){
        score.losses = 0;
        score.wins =0;
        score.ties= 0;
      }
    </script>
  </body>
</html>
